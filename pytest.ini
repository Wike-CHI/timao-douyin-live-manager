[pytest]
# pytest配置文件

# 测试目录
testpaths = tests

# Python路径配置
pythonpath = .

# 异步测试配置
asyncio_mode = auto

# 输出配置
addopts = 
    -v
    --tb=short
    --color=yes
    --strict-markers
    --disable-warnings

# 标记配置
markers =
    asyncio: 异步测试
    integration: 集成测试
    unit: 单元测试
    redis: Redis相关测试
    slow: 慢速测试

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（可选）
# --cov=server
# --cov-report=html
# --cov-report=term-missing

