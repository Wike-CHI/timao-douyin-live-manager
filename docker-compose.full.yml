# ============================================
# 前后端完整 Docker Compose 配置
# 遵循：奥卡姆剃刀 + 希克定律
# ============================================
# 一键启动前后端，只需配置6个必需项

version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: timao-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-11111}:11111"
    env_file:
      - ./server/.env
    volumes:
      - ./server/models:/app/models
      - ./server/logs:/app/logs
      - ./server/records:/app/records
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11111/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - timao-network

  # 前端服务
  frontend:
    build:
      context: ./electron/renderer
      dockerfile: Dockerfile
      args:
        # 使用后端服务名（同一网络内）
        VITE_FASTAPI_URL: http://backend:11111
        VITE_STREAMCAP_URL: http://backend:11111
        VITE_DOUYIN_URL: http://backend:11111
    container_name: timao-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      # Nginx 代理使用后端服务名
      BACKEND_URL: http://backend:11111
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - timao-network

networks:
  timao-network:
    driver: bridge

