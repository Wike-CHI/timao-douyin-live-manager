# 提猫直播助手 - 完整 Nginx 配置
# 
# 功能：
# - 静态前端文件服务 (/)
# - 后端 API 反向代理 (/api/*, /health, /docs 等)
# 
# 部署方式：
# 1. 复制此配置到宝塔面板站点配置
# 2. 修改端口/路径（如需要）
# 3. 保存并重新加载 Nginx

server {
    listen 80;
    server_name 129.211.218.135;
    
    # 日志配置
    access_log /www/wwwlogs/timao-access.log;
    error_log /www/wwwlogs/timao-error.log;
    
    # 客户端配置
    client_max_body_size 50M;
    
    # 超时设置
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    
    # ===================================================================
    # 前端静态文件服务（优先级最高）
    # ===================================================================
    location / {
        root /www/wwwroot/timao-app;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 缓存策略
        location ~* \.(html)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # ===================================================================
    # 后端 API 路由
    # ===================================================================
    
    # 所有 /api/ 路由
    location /api/ {
        proxy_pass http://127.0.0.1:11111;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 长轮询支持
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    # 审计日志
    location /audit {
        proxy_pass http://127.0.0.1:11111;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 权限管理
    location /permission {
        proxy_pass http://127.0.0.1:11111;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 用户配置
    location /profile {
        proxy_pass http://127.0.0.1:11111;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:11111/health;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # FastAPI 文档
    location /docs {
        proxy_pass http://127.0.0.1:11111/docs;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /redoc {
        proxy_pass http://127.0.0.1:11111/redoc;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /openapi.json {
        proxy_pass http://127.0.0.1:11111/openapi.json;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 静态资源
    location /static/ {
        proxy_pass http://127.0.0.1:11111/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # ===================================================================
    # 错误页面
    # ===================================================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /www/server/nginx/html;
    }
    
    # ===================================================================
    # 安全设置
    # ===================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

