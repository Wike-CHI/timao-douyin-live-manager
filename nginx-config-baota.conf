# 提猫直播助手 - Nginx 反向代理配置（宝塔面板）
# 
# 配置说明：
# 1. 在宝塔面板创建站点，使用公网IP: 129.211.218.135
# 2. 将此配置内容复制到站点的配置文件中
# 3. 确保后端服务运行在 127.0.0.1:11111
#
# 使用方法：
# 宝塔面板 → 网站 → 选择站点 → 设置 → 配置文件 → 粘贴以下内容

server {
    listen 80;
    server_name 129.211.218.135;
    
    # 日志配置
    access_log /www/wwwlogs/timao-access.log;
    error_log /www/wwwlogs/timao-error.log;
    
    # 客户端最大上传大小
    client_max_body_size 50M;
    
    # 超时设置
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    
    # ===================================================================
    # 静态文件优先（如果部署前端静态文件）
    # ===================================================================
    location / {
        # 如果有静态文件，先尝试提供静态文件
        # root /www/wwwroot/wwwroot/timao-douyin-live-manager/electron/renderer/dist;
        # try_files $uri $uri/ @backend;
        
        # 直接代理到后端
        proxy_pass http://127.0.0.1:11111;
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 禁用缓存
        proxy_buffering off;
        proxy_cache off;
    }
    
    # ===================================================================
    # API 路由 - 反向代理到 FastAPI 后端
    # ===================================================================
    
    # 所有 /api/ 开头的路由（覆盖大部分API）
    location /api/ {
        proxy_pass http://127.0.0.1:11111;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置（针对长轮询）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    # 审计日志 API
    location /audit {
        proxy_pass http://127.0.0.1:11111;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 权限管理 API
    location /permission {
        proxy_pass http://127.0.0.1:11111;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 用户配置文件 API
    location /profile {
        proxy_pass http://127.0.0.1:11111;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ===================================================================
    # 健康检查端点
    # ===================================================================
    location /health {
        proxy_pass http://127.0.0.1:11111/health;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # 快速超时
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # ===================================================================
    # FastAPI 文档
    # ===================================================================
    location /docs {
        proxy_pass http://127.0.0.1:11111/docs;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /redoc {
        proxy_pass http://127.0.0.1:11111/redoc;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /openapi.json {
        proxy_pass http://127.0.0.1:11111/openapi.json;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # ===================================================================
    # 静态资源（如果需要）
    # ===================================================================
    location /static/ {
        # 后端静态文件
        proxy_pass http://127.0.0.1:11111/static/;
        
        # 或者直接提供本地文件
        # alias /www/wwwroot/wwwroot/timao-douyin-live-manager/server/static/;
        
        # 缓存设置
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # ===================================================================
    # 错误页面
    # ===================================================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /www/server/nginx/html;
    }
    
    # ===================================================================
    # 安全设置
    # ===================================================================
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问备份文件
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

