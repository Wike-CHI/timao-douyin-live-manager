# ============================================
# Nginx 配置 - 前端静态文件服务
# 遵循：奥卡姆剃刀 - 最简单的配置
# ============================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 代理（可选，如果前后端在同一服务器）
    # 注意：如果使用代理，需要在前端构建时配置正确的后端地址
    # 或者使用 Nginx 的 envsubst 替换环境变量
    # 默认情况下，前端直接连接后端，不需要代理
    # 
    # 如果需要代理，取消下面的注释并配置 BACKEND_URL 环境变量
    # location /api/ {
    #     proxy_pass http://backend:11111/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     
    #     # WebSocket 支持
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    # WebSocket 代理（用于实时音频转写）
    # 如果需要代理 WebSocket，取消下面的注释
    # location /api/live_audio/ws {
    #     proxy_pass http://backend:11111/api/live_audio/ws;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_read_timeout 86400;
    # }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

