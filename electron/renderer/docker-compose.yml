# ============================================
# 前端 Docker Compose 配置
# 遵循：奥卡姆剃刀 + 希克定律
# ============================================
# 最简单的编排，只需配置后端地址

version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时注入后端地址（只需配置1个）
        VITE_FASTAPI_URL: ${BACKEND_URL:-http://backend:11111}
        VITE_STREAMCAP_URL: ${BACKEND_URL:-http://backend:11111}
        VITE_DOUYIN_URL: ${BACKEND_URL:-http://backend:11111}
    container_name: timao-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    # 注意：前端构建时已注入后端地址，运行时不需要环境变量
    # 如果需要 Nginx 代理，可以在这里配置
    # environment:
    #   BACKEND_URL: ${BACKEND_URL:-http://backend:11111}
    # 如果后端在同一 Docker 网络中，可以添加网络
    # networks:
    #   - timao-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# networks:
#   timao-network:
#     external: true

