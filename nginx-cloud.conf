# 提猫直播助手 - Nginx 反向代理配置（云端服务）
# 审查人：叶维哲
# 适用于：宝塔面板 / 标准Nginx
# 
# 配置说明：
# - 云端服务端口：15000 (timao-cloud)
# - 功能：用户登录、订阅、支付、积分检查
# - 客户端必须连接云端才能使用
# - 其他服务（音频转写、AI分析、弹幕）在客户端本地执行
# 
# 使用方法（宝塔面板）：
# 1. 宝塔面板 → 网站 → 选择站点（或创建新站点）
# 2. 设置 → 配置文件
# 3. 将下面的配置复制替换整个 server 块
#
# 使用方法（标准Nginx）：
# 1. 复制此文件到 /etc/nginx/sites-available/timao-cloud.conf
# 2. 创建软链接: ln -s /etc/nginx/sites-available/timao-cloud.conf /etc/nginx/sites-enabled/
# 3. 测试配置: nginx -t
# 4. 重载Nginx: nginx -s reload

server {
    listen 80;
    server_name 129.211.218.135;  # 替换为你的域名或IP
    
    # ===================================================================
    # 日志配置
    # ===================================================================
    access_log /www/wwwlogs/timao-cloud-access.log;
    error_log /www/wwwlogs/timao-cloud-error.log;
    
    # ===================================================================
    # 客户端配置
    # ===================================================================
    client_max_body_size 20M;  # 上传头像等文件
    
    # ===================================================================
    # 超时设置（云端服务响应快，无需长时间等待）
    # ===================================================================
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    # ===================================================================
    # 健康检查端点（公开，无需认证）
    # ===================================================================
    location /health {
        proxy_pass http://127.0.0.1:15000/health;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存
        proxy_buffering off;
        proxy_cache off;
    }
    
    # ===================================================================
    # 用户认证 API（登录、注册、Token管理）
    # ===================================================================
    location /api/auth/ {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存（认证信息实时）
        proxy_buffering off;
        proxy_cache off;
    }
    
    # ===================================================================
    # 用户资料 API（个人信息、头像、偏好设置）
    # ===================================================================
    location /profile/ {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存
        proxy_buffering off;
        proxy_cache off;
    }
    
    # ===================================================================
    # 订阅 API（套餐、订阅状态、积分）
    # ===================================================================
    location /api/subscription/ {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存
        proxy_buffering off;
        proxy_cache off;
    }
    
    # ===================================================================
    # 支付 API（创建订单、支付回调）
    # ===================================================================
    location /api/payment/ {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存
        proxy_buffering off;
        proxy_cache off;
    }
    
    # ===================================================================
    # 管理后台 API（可选）
    # ===================================================================
    location /api/admin/ {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存
        proxy_buffering off;
        proxy_cache off;
    }
    
    # ===================================================================
    # API 文档（FastAPI自动生成）
    # ===================================================================
    location /docs {
        proxy_pass http://127.0.0.1:15000/docs;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /openapi.json {
        proxy_pass http://127.0.0.1:15000/openapi.json;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # ===================================================================
    # 静态文件（Nginx直接服务，性能更好）
    # ===================================================================
    location /static/ {
        alias /www/wwwroot/wwwroot/timao-douyin-live-manager/server/cloud/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # 尝试直接返回文件，失败则返回404
        try_files $uri =404;
    }
    
    # ===================================================================
    # 根路径（云端服务控制台）
    # ===================================================================
    location = / {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存（控制台页面）
        proxy_buffering off;
        proxy_cache off;
    }
    
    # ===================================================================
    # API请求代理到FastAPI
    # ===================================================================
    location / {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存
        proxy_buffering off;
        proxy_cache off;
    }
    
    # ===================================================================
    # 防止直接访问不存在的路径
    # ===================================================================
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }
    
    location = /robots.txt {
        log_not_found off;
        access_log off;
        return 200 "User-agent: *\nDisallow: /\n";
    }
}

