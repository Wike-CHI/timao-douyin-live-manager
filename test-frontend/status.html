<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalkingCat · 转写状态面板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.86);
      --border: rgba(148, 163, 184, 0.24);
      --accent: #34d399;
      --accent-strong: #059669;
      --danger: #f87171;
      --warn: #fbbf24;
      --text: #e2e8f0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(160deg, #0f172a 0%, #020617 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 40px 16px 48px;
    }

    main {
      width: min(1100px, 100%);
      background: var(--panel);
      border-radius: 32px;
      border: 1px solid var(--border);
      padding: 32px;
      box-shadow: 0 30px 80px rgba(2, 6, 23, 0.6);
    }

    header h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 34px);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header p {
      margin: 6px 0 24px;
      color: rgba(226, 232, 240, 0.75);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .panel {
      background: rgba(15, 23, 42, 0.75);
      border-radius: 24px;
      padding: 20px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 260px;
    }

    .panel h2 {
      margin: 0;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      color: rgba(226, 232, 240, 0.8);
    }

    input, select {
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.6);
      padding: 10px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 0;
      font-size: 15px;
      cursor: pointer;
      color: white;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }

    button.danger {
      background: linear-gradient(135deg, #fb7185, #ef4444);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    button:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 32px rgba(5, 150, 105, 0.3);
    }

    .status-box {
      background: rgba(15, 23, 42, 0.6);
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 16px;
      min-height: 200px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    ul.logs {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 240px;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
    }

    ul.logs li {
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
      padding: 8px 0;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    ul.logs li span.meta {
      color: rgba(226, 232, 240, 0.5);
      font-size: 12px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>💚 SenseVoice 转写状态</h1>
      <p>最小可用控制台。仅保留必要参数，方便本地联调。</p>
    </header>

    <section class="grid">
      <article class="panel">
        <h2>⚙️ 启动参数</h2>
        <form id="startForm" class="form">
          <label>
            Douyin 直播链接 / ID
            <input id="liveInput" type="text" placeholder="https://live.douyin.com/xxxx 或 926155072586" required />
          </label>
          <label>
            Preset（Profile）
            <select id="profileSelect">
              <option value="">自动</option>
              <option value="fast">fast</option>
              <option value="stable">stable</option>
            </select>
          </label>
          <label>
            Session ID（可选）
            <input id="sessionInput" type="text" placeholder="同一房间重复启动时可复用" />
          </label>
          <div class="btn-row">
            <button id="startBtn" class="primary" type="submit">启动转写</button>
            <button id="stopBtn" class="danger" type="button">停止转写</button>
          </div>
        </form>
      </article>

      <article class="panel">
        <h2>📊 实时状态</h2>
        <div class="status-box" id="statusBox">加载中…</div>
        <button id="refreshBtn" class="primary" type="button">立即刷新</button>
      </article>
    </section>

    <article class="panel" style="margin-top: 24px;">
      <h2>📝 操作记录</h2>
      <ul class="logs" id="logList"></ul>
    </article>
  </main>

  <script>
    const statusBox = document.getElementById('statusBox');
    const logList = document.getElementById('logList');
    const startForm = document.getElementById('startForm');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const refreshBtn = document.getElementById('refreshBtn');

    function log(message, tone = 'info') {
      const li = document.createElement('li');
      li.innerHTML = `<span>${message}</span><span class="meta">${new Date().toLocaleTimeString()} · ${tone}</span>`;
      logList.prepend(li);
      while (logList.children.length > 200) {
        logList.removeChild(logList.lastChild);
      }
    }

    async function refreshStatus() {
      try {
        const resp = await fetch('/api/live_audio/status');
        if (!resp.ok) throw new Error(resp.statusText);
        const result = await resp.json();
        if (!result?.data) {
          statusBox.textContent = '未运行';
          return;
        }
        const data = result.data;
        const adv = data.advanced || {};
        const stats = data.stats || {};
        statusBox.textContent = [
          `运行: ${data.is_running ? '✅' : '⏸️'}`,
          `LiveID: ${data.live_id || '—'}`,
          `LiveURL: ${data.live_url || '—'}`,
          `模式/模型: ${data.mode || '-'} / ${data.model || '-'}`,
          `Profile: ${data.profile || '-'}`,
          `持久化: ${adv.persist_enabled ? '开启' : '关闭'} ${adv.persist_root ? '(' + adv.persist_root + ')' : ''}`,
          `AGC: ${adv.agc_enabled ? '✅' : '⏸️'} · Diarizer: ${adv.diarizer_active ? '✅' : '⏸️'}`,
          `统计: 成功 ${stats.successful_transcriptions ?? 0} · 失败 ${stats.failed_transcriptions ?? 0}`,
        ].join('\\n');
      } catch (err) {
        statusBox.textContent = `状态获取失败：${err.message}`;
      }
    }

    async function startTranscription(evt) {
      evt.preventDefault();
      const liveVal = document.getElementById('liveInput').value.trim();
      if (!liveVal) {
        log('请输入直播链接或 ID', 'warn');
        return;
      }
      startBtn.disabled = true;
      try {
        const payload = {};
        if (/^https?:/.test(liveVal)) {
          payload.live_url = liveVal;
        } else {
          payload.live_url = `https://live.douyin.com/${liveVal}`;
        }
        const session = document.getElementById('sessionInput').value.trim();
        if (session) payload.session_id = session;
        const profile = document.getElementById('profileSelect').value;
        if (profile) payload.profile = profile;

        const resp = await fetch('/api/live_audio/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) {
          const detail = await resp.json().catch(() => ({}));
          throw new Error(detail?.message || detail?.detail || '启动失败');
        }
        const data = await resp.json();
        log(`转写已启动：${JSON.stringify(data.data || data)}`, 'success');
        await refreshStatus();
      } catch (err) {
        log(`启动失败：${err.message}`, 'error');
      } finally {
        startBtn.disabled = false;
      }
    }

    async function stopTranscription() {
      stopBtn.disabled = true;
      try {
        const resp = await fetch('/api/live_audio/stop', { method: 'POST' });
        if (!resp.ok) {
          const detail = await resp.json().catch(() => ({}));
          throw new Error(detail?.message || detail?.detail || '停止失败');
        }
        log('已发送停止指令', 'warn');
        await refreshStatus();
      } catch (err) {
        log(`停止失败：${err.message}`, 'error');
      } finally {
        stopBtn.disabled = false;
      }
    }

    startForm.addEventListener('submit', startTranscription);
    stopBtn.addEventListener('click', stopTranscription);
    refreshBtn.addEventListener('click', refreshStatus);

    refreshStatus();
    setInterval(refreshStatus, 7000);
  </script>
</body>
</html>
