<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalkingCat · Douyin 抓取面板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.9);
      --border: rgba(148, 163, 184, 0.2);
      --accent: #38bdf8;
      --accent-strong: #0ea5e9;
      --muted: rgba(226, 232, 240, 0.65);
      --text: #e2e8f0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 40px 16px 56px;
    }

    main {
      width: min(1200px, 100%);
      background: var(--panel);
      border-radius: 32px;
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: 0 30px 70px rgba(2, 6, 23, 0.7);
    }

    header h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 34px);
    }

    header p {
      margin: 6px 0 24px;
      color: var(--muted);
    }

    .control-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    input {
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.65);
      color: var(--text);
      padding: 12px 16px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 0;
      font-size: 15px;
      cursor: pointer;
      color: white;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }

    button.secondary {
      background: rgba(148, 163, 184, 0.25);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    button:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 32px rgba(56, 189, 248, 0.25);
    }

    .status-box {
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      padding: 16px;
      background: rgba(15, 23, 42, 0.65);
      min-height: 60px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 20px;
    }

    .panel {
      border-radius: 24px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(15, 23, 42, 0.75);
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 420px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    li {
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
      padding: 10px 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 12px;
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
      font-size: 12px;
      margin-right: 6px;
    }

    .nickname {
      font-weight: 600;
      color: var(--accent);
    }

    .event-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>🧪 Douyin 抓取测试</h1>
      <p>直接调用 <code>/api/douyin/web/*</code> 接口，验证实时弹幕/礼物流。保持最小输入，快速定位问题。</p>
    </header>

    <section class="control-bar">
      <input id="liveInput" type="text" placeholder="直播间号或 https://live.douyin.com/xxxxx" />
      <button id="startBtn" class="primary">启动抓取</button>
      <button id="stopBtn" class="secondary">停止</button>
    </section>

    <div id="statusBox" class="status-box">等待启动…</div>

    <section class="layout">
      <article class="panel">
        <h2>💬 实时弹幕 / 礼物</h2>
        <ul id="chatList"></ul>
      </article>

      <article class="panel">
        <h2>📡 事件流</h2>
        <ul id="eventList"></ul>
      </article>
    </section>
  </main>

  <script>
    const liveInput = document.getElementById('liveInput');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusBox = document.getElementById('statusBox');
    const chatList = document.getElementById('chatList');
    const eventList = document.getElementById('eventList');

    let eventSource = null;
    const chatBuffer = [];
    const eventBuffer = [];
    const MAX_CHAT = 80;
    const MAX_EVENT = 120;

    function updateStatus(message, tone = 'info') {
      const emojis = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️' };
      statusBox.textContent = `${emojis[tone] || 'ℹ️'} ${message}`;
    }

    function normalizeLiveId(raw) {
      if (!raw) return null;
      const value = raw.trim();
      if (/^https?:/i.test(value)) {
        return { live_url: value };
      }
      return { live_id: value };
    }

    async function startRelay() {
      const payload = normalizeLiveId(liveInput.value);
      if (!payload) {
        updateStatus('请先输入直播间号或链接', 'warning');
        liveInput.focus();
        return;
      }
      startBtn.disabled = true;
      try {
        ensureEventSource();
        const resp = await fetch('/api/douyin/web/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) {
          const detail = await resp.json().catch(() => ({}));
          throw new Error(detail?.detail || detail?.message || resp.statusText);
        }
        updateStatus('抓取任务已启动，等待数据…', 'success');
      } catch (err) {
        updateStatus(`启动失败：${err.message}`, 'error');
      } finally {
        startBtn.disabled = false;
      }
    }

    async function stopRelay() {
      stopBtn.disabled = true;
      try {
        await fetch('/api/douyin/web/stop', { method: 'POST' });
        updateStatus('抓取已停止', 'warning');
      } catch (err) {
        updateStatus(`停止失败：${err.message}`, 'error');
      } finally {
        stopBtn.disabled = false;
      }
    }

    function ensureEventSource() {
      if (eventSource) return;
      eventSource = new EventSource('/api/douyin/web/stream');
      eventSource.onopen = () => updateStatus('SSE 通道已建立，等待数据…', 'info');
      eventSource.onerror = () => updateStatus('SSE 通道异常或断开', 'warning');
      eventSource.onmessage = (evt) => {
        try {
          const data = JSON.parse(evt.data);
          handleEvent(data);
        } catch (err) {
          console.warn('解析事件失败', err);
        }
      };
    }

    function handleEvent(event) {
      const { type, payload = {}, timestamp } = event;
      if (type === 'status') {
        const stage = payload.stage;
        updateStatus(`状态：${stage || '未知'}`, stage === 'connected' ? 'success' : 'info');
        return;
      }
      if (type === 'error') {
        updateStatus(`错误：${payload.message || '未知'}`, 'error');
        appendEvent({ text: payload.message || '错误', type: 'error', timestamp });
        return;
      }
      if (type === 'chat' || type === 'gift') {
        appendChat(type, payload, timestamp);
      } else {
        appendEvent(formatEvent(type, payload), timestamp);
      }
    }

    function appendChat(kind, payload, ts) {
      chatBuffer.push({
        kind,
        nickname: payload.nickname || '匿名',
        text: kind === 'gift'
          ? `送出 ${payload.gift_name || ''} ×${payload.count || 1}`
          : payload.content || '',
        timestamp: ts || Date.now(),
      });
      if (chatBuffer.length > MAX_CHAT) {
        chatBuffer.splice(0, chatBuffer.length - MAX_CHAT);
      }
      renderList(chatList, chatBuffer, (item) => `
        <div><span class="badge">${item.kind === 'gift' ? '🎁' : '💬'}</span>
        <span class="nickname">${item.nickname}</span></div>
        <div>${item.text}</div>
        <div class="event-meta">${new Date(item.timestamp).toLocaleTimeString()}</div>
      `);
    }

    function formatEvent(type, payload) {
      switch (type) {
        case 'like':
          return `${payload.nickname || '匿名'} 点赞 +${payload.count || 0}`;
        case 'member':
          return `${payload.nickname || '匿名'} 进入直播间`;
        case 'follow':
          return `${payload.nickname || '匿名'} 关注了主播`;
        case 'fansclub':
          return `粉丝团事件：${payload.content || ''}`;
        case 'room_user_stats':
          return `在线 ${payload.current ?? '-'} · 累计 ${payload.total ?? '-'}`;
        case 'room_stats':
          return `人气 ${payload.total_user ?? '-'} · 点赞 ${payload.like_count ?? '-'}`;
        case 'room_rank':
          return `更新排行榜（Top${(payload.ranks || []).length})`;
        default:
          return `${type} 事件`;
      }
    }

    function appendEvent(text, timestamp = Date.now()) {
      if (!text) return;
      eventBuffer.push({ text, timestamp });
      if (eventBuffer.length > MAX_EVENT) {
        eventBuffer.splice(0, eventBuffer.length - MAX_EVENT);
      }
      renderList(eventList, eventBuffer, (item) => `
        <div>${item.text}</div>
        <div class="event-meta">${new Date(item.timestamp).toLocaleTimeString()}</div>
      `);
    }

    function renderList(container, data, renderer) {
      container.innerHTML = data.slice().reverse().map(renderer).map((html) => `<li>${html}</li>`).join('');
    }

    async function fetchStatus() {
      try {
        const resp = await fetch('/api/douyin/web/status');
        if (!resp.ok) throw new Error(resp.statusText);
        const status = await resp.json();
        const lines = [
          `运行: ${status.is_running ? '✅' : '⏸️'}`,
          `LiveID: ${status.live_id || '—'}`,
          `RoomID: ${status.room_id || '—'}`,
          status.last_error ? `错误: ${status.last_error}` : '',
        ].filter(Boolean);
        updateStatus(lines.join(' · ') || '空闲', status.is_running ? 'success' : 'info');
      } catch (err) {
        updateStatus(`状态获取失败：${err.message}`, 'error');
      }
    }

    startBtn.addEventListener('click', startRelay);
    stopBtn.addEventListener('click', stopRelay);
    window.addEventListener('beforeunload', () => eventSource?.close());

    ensureEventSource();
    fetchStatus();
    setInterval(fetchStatus, 7000);
  </script>
</body>
</html>
