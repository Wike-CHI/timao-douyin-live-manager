<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalkingCat · 测试面板导航</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.88);
      --border: rgba(148, 163, 184, 0.24);
      --accent: #38bdf8;
      --accent-strong: #0ea5e9;
      --text: #e2e8f0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 40px 16px 48px;
    }

    main {
      width: min(1100px, 100%);
      background: var(--panel);
      border-radius: 32px;
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: 0 30px 80px rgba(2, 6, 23, 0.6);
    }

    header h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 34px);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header p {
      margin: 6px 0 0;
      color: rgba(226, 232, 240, 0.75);
    }

    .grid {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(15, 23, 42, 0.75);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 220px;
    }

    .card h2 {
      margin: 0;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card p {
      margin: 0;
      color: rgba(226, 232, 240, 0.75);
      line-height: 1.45;
      flex: 1;
    }

    .card pre {
      margin: 0;
      background: rgba(15, 23, 42, 0.65);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      font-size: 13px;
      line-height: 1.35;
      color: rgba(226, 232, 240, 0.8);
      max-height: 120px;
      overflow: auto;
    }

    .card button {
      border: none;
      border-radius: 12px;
      padding: 12px 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 36px rgba(56, 189, 248, 0.3);
    }

    footer {
      margin-top: 30px;
      text-align: center;
      font-size: 13px;
      color: rgba(226, 232, 240, 0.5);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>🎯 TalkingCat 测试工作台</h1>
      <p>本地语音转写 + Douyin 抓取 + 联合联调入口</p>
    </header>

    <section class="grid">
      <article class="card">
        <h2>💚 转写状态</h2>
        <p>查看/控制本地 SenseVoice VAD 转写服务，启动前可校验模型健康度。</p>
        <pre id="asrStatus">加载中…</pre>
        <button data-link="status.html">打开面板</button>
      </article>

      <article class="card">
        <h2>🧪 Douyin 面板</h2>
        <p>输入直播间号或链接即可拉起抓取，实时查看弹幕/礼物/互动事件。</p>
        <pre id="douyinStatus">加载中…</pre>
        <button data-link="douyin_test.html">开始调试</button>
      </article>

      <article class="card">
        <h2>🧪 联合测试</h2>
        <p>一次性联动转写与 Douyin 抓取，验证弹幕与语音流的同步性。</p>
        <pre id="liveTestStatus">加载中…</pre>
        <button data-link="live_test.html">进入联调</button>
      </article>
    </section>

    <footer>提猫直播助手 · TalkingCat</footer>
  </main>

  <script>
    const statusMap = {
      asrStatus: { url: '/api/live_audio/status', parser: (data) => {
        if (!data?.data) return '未启动';
        const payload = data.data;
        return [
          `运行: ${payload.is_running ? '✅' : '⏸️'}`,
          `模式: ${payload.mode || '-'}`,
          `模型: ${payload.model || '-'}`,
          `LiveID: ${payload.live_id || '—'}`,
        ].join('\\n');
      }},
      douyinStatus: { url: '/api/douyin/web/status', parser: (data) => {
        if (!data) return '未连接';
        return [
          `运行: ${data.is_running ? '✅' : '⏸️'}`,
          `LiveID: ${data.live_id || '—'}`,
          `RoomID: ${data.room_id || '—'}`,
          data.last_error ? `错误: ${data.last_error}` : '',
        ].filter(Boolean).join('\\n') || '就绪';
      }},
      liveTestStatus: { url: '/api/live-test/status', parser: (data) => {
        if (!data) return '未运行';
        return [
          `运行: ${data.is_running ? '✅' : '⏸️'}`,
          `LiveID: ${data.live_id || '—'}`,
          `转写: ${data.ast_running ? '✅' : '⏸️'}`,
          `弹幕: ${data.douyin_running ? '✅' : '⏸️'}`,
          data.last_error ? `错误: ${data.last_error}` : '',
        ].filter(Boolean).join('\\n') || '就绪';
      }},
    };

    async function refreshStatuses() {
      for (const [id, cfg] of Object.entries(statusMap)) {
        const holder = document.getElementById(id);
        try {
          const resp = await fetch(cfg.url);
          if (!resp.ok) throw new Error(resp.statusText);
          const payload = await resp.json();
          holder.textContent = cfg.parser(payload);
        } catch (err) {
          holder.textContent = '获取失败：' + err.message;
        }
      }
    }

    document.querySelectorAll('[data-link]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.link;
        if (target) {
          window.location.href = target;
        }
      });
    });

    refreshStatuses();
    setInterval(refreshStatuses, 8000);
  </script>
</body>
</html>
