# ============================================
# 生产环境 Docker Compose 配置
# 遵循：奥卡姆剃刀 - 最简单的生产配置
# ============================================

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timao-backend-prod
    restart: always  # 生产环境总是重启
    ports:
      - "${BACKEND_PORT:-11111}:11111"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./records:/app/records
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DEBUG=false  # 生产环境禁用调试
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11111/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # 生产环境给更多启动时间
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - timao-network

networks:
  timao-network:
    driver: bridge

