# ============================================
# 提猫直播助手 - Docker Compose 配置
# 遵循：奥卡姆剃刀 + 希克定律
# ============================================
# 最简单的编排，只需配置6个必需项

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timao-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-11111}:11111"
    env_file:
      - .env
    volumes:
      # 持久化模型文件（避免重复下载）
      - ./models:/app/models
      # 持久化日志
      - ./logs:/app/logs
      # 持久化录制文件
      - ./records:/app/records
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11111/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - timao-network

networks:
  timao-network:
    driver: bridge

