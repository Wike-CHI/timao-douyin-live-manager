<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数据统计 - 提猫直播助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
        }
        .live-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .live-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="bg-gradient-to-r from-purple-600 to-purple-800 text-white shadow-lg">
        <div class="flex items-center justify-between px-4 py-4">
            <div class="flex items-center space-x-3">
                <button onclick="window.history.back()" class="text-white">
                    <i class="fas fa-arrow-left text-lg"></i>
                </button>
                <h1 class="text-lg font-bold">数据统计</h1>
            </div>
            <button id="filterBtn" class="text-white">
                <i class="fas fa-filter"></i>
            </button>
        </div>
    </div>

    <!-- 日期筛选器 -->
    <div class="bg-white mx-4 mt-4 rounded-2xl shadow-sm p-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fas fa-calendar-alt text-purple-600"></i>
                <span class="text-sm font-medium text-gray-700">日期范围</span>
            </div>
            <select id="dateRange" class="text-sm border border-gray-300 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-500">
                <option value="today">今天</option>
                <option value="week" selected>最近7天</option>
                <option value="month">最近30天</option>
                <option value="all">全部</option>
            </select>
        </div>
    </div>

    <!-- 统计概览 -->
    <div class="mx-4 mt-4">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gradient-to-br from-purple-500 to-purple-600 rounded-2xl shadow-lg p-4 text-white">
                <div class="text-xs opacity-80 mb-1">总直播场次</div>
                <div class="text-2xl font-bold">24</div>
            </div>
            <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl shadow-lg p-4 text-white">
                <div class="text-xs opacity-80 mb-1">总时长</div>
                <div class="text-2xl font-bold">48h</div>
            </div>
        </div>
    </div>

    <!-- 直播记录列表 -->
    <div class="mx-4 mt-4 mb-4">
        <h2 class="text-sm font-semibold text-gray-700 mb-3">直播记录</h2>
        <div id="liveRecordsList" class="space-y-3">
            <!-- 记录项将通过JS动态添加 -->
        </div>
    </div>

    <script>
        // 检查登录状态
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }

        // 模拟直播记录数据
        const liveRecords = [
            {
                id: 1,
                date: '2025-01-27',
                startTime: '14:30',
                endTime: '17:45',
                duration: '3小时15分',
                comments: 2341,
                gifts: 89,
                viewers: 15420,
                reviewStatus: 'completed',
                reviewLevel: '完整复盘'
            },
            {
                id: 2,
                date: '2025-01-26',
                startTime: '19:00',
                endTime: '22:30',
                duration: '3小时30分',
                comments: 3124,
                gifts: 156,
                viewers: 18234,
                reviewStatus: 'completed',
                reviewLevel: '完整复盘'
            },
            {
                id: 3,
                date: '2025-01-25',
                startTime: '20:00',
                endTime: '23:15',
                duration: '3小时15分',
                comments: 2890,
                gifts: 134,
                viewers: 16987,
                reviewStatus: 'pending',
                reviewLevel: null
            },
            {
                id: 4,
                date: '2025-01-24',
                startTime: '15:00',
                endTime: '18:20',
                duration: '3小时20分',
                comments: 2156,
                gifts: 98,
                viewers: 14256,
                reviewStatus: 'completed',
                reviewLevel: '完整复盘'
            },
        ];

        // 渲染直播记录
        function renderLiveRecords(records) {
            const list = document.getElementById('liveRecordsList');
            list.innerHTML = records.map(record => {
                const statusBadge = record.reviewStatus === 'completed' 
                    ? `<span class="status-badge bg-green-100 text-green-700">
                        <i class="fas fa-check-circle mr-1"></i>已生成复盘
                       </span>`
                    : `<span class="status-badge bg-gray-100 text-gray-600">
                        <i class="fas fa-clock mr-1"></i>未生成
                       </span>`;

                return `
                    <div class="live-card bg-white rounded-2xl shadow-sm p-4 cursor-pointer" onclick="viewDetail(${record.id})">
                        <div class="flex items-start justify-between mb-3">
                            <div>
                                <div class="flex items-center space-x-2 mb-1">
                                    <span class="font-semibold text-gray-800">${record.date}</span>
                                    <span class="text-xs text-gray-500">${record.startTime} - ${record.endTime}</span>
                                </div>
                                <div class="text-xs text-gray-500">
                                    <i class="far fa-clock mr-1"></i>${record.duration}
                                </div>
                            </div>
                            ${statusBadge}
                        </div>
                        <div class="grid grid-cols-3 gap-3 pt-3 border-t border-gray-100">
                            <div class="text-center">
                                <div class="text-sm font-semibold text-purple-600">${record.comments.toLocaleString()}</div>
                                <div class="text-xs text-gray-500">弹幕</div>
                            </div>
                            <div class="text-center">
                                <div class="text-sm font-semibold text-orange-500">${record.gifts}</div>
                                <div class="text-xs text-gray-500">礼物</div>
                            </div>
                            <div class="text-center">
                                <div class="text-sm font-semibold text-blue-500">${record.viewers.toLocaleString()}</div>
                                <div class="text-xs text-gray-500">观众</div>
                            </div>
                        </div>
                        <div class="mt-3 pt-3 border-t border-gray-100 flex items-center justify-between">
                            <span class="text-xs text-gray-500">
                                ${record.reviewStatus === 'completed' ? '复盘级别：' + record.reviewLevel : '点击生成复盘'}
                            </span>
                            <i class="fas fa-chevron-right text-gray-400"></i>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 查看详情
        function viewDetail(id) {
            window.location.href = `report.html?id=${id}`;
        }

        // 初始化
        renderLiveRecords(liveRecords);

        // 日期筛选
        document.getElementById('dateRange').addEventListener('change', function() {
            // 这里可以根据选择的日期范围过滤数据
            console.log('筛选日期范围：', this.value);
        });
    </script>
</body>
</html>
