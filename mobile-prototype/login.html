<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 提猫直播助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .input-focus:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <!-- Logo和标题 -->
        <div class="text-center mb-8">
            <div class="inline-block w-20 h-20 bg-white rounded-2xl shadow-lg flex items-center justify-center mb-4">
                <i class="fas fa-cat text-4xl text-purple-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">提猫直播助手</h1>
            <p class="text-white/80 text-sm">TalkingCat Live Manager</p>
        </div>

        <!-- 登录表单 -->
        <div class="glass-effect rounded-3xl shadow-2xl p-8">
            <form id="loginForm" class="space-y-6">
                <!-- 用户名/邮箱输入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-user mr-2 text-purple-600"></i>用户名或邮箱
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 input-focus transition-all outline-none"
                        placeholder="请输入用户名或邮箱"
                    >
                </div>

                <!-- 密码输入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-2 text-purple-600"></i>密码
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            required
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 input-focus transition-all outline-none pr-12"
                            placeholder="请输入密码"
                        >
                        <button 
                            type="button" 
                            id="togglePassword"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-purple-600"
                        >
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- 记住我和忘记密码 -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="rememberMe" class="w-4 h-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-2 text-gray-700">记住我</span>
                    </label>
                    <a href="#" class="text-purple-600 hover:text-purple-700 font-medium">忘记密码？</a>
                </div>

                <!-- 登录按钮 -->
                <button 
                    type="submit" 
                    id="loginBtn"
                    class="w-full bg-gradient-to-r from-purple-600 to-purple-800 text-white py-3 rounded-xl font-semibold shadow-lg hover:shadow-xl transform hover:scale-[1.02] transition-all duration-200"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i>登录
                </button>

                <!-- 注册链接 -->
                <div class="text-center pt-4">
                    <p class="text-gray-600 text-sm">
                        还没有账号？ 
                        <a href="#" id="registerLink" class="text-purple-600 font-semibold hover:underline">立即注册</a>
                    </p>
                </div>
            </form>

            <!-- 错误提示 -->
            <div id="errorMsg" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i><span id="errorText"></span>
            </div>
        </div>

        <!-- 版本信息 -->
        <div class="text-center mt-6">
            <p class="text-white/60 text-xs">版本 v1.0.0</p>
        </div>
    </div>

    <script>
        // 密码显示/隐藏切换
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // 显示加载状态
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>登录中...';
            loginBtn.disabled = true;
            errorMsg.classList.add('hidden');

            // 模拟API调用
            setTimeout(() => {
                // 模拟登录成功
                if (username && password) {
                    // 保存登录状态
                    if (rememberMe) {
                        localStorage.setItem('rememberMe', 'true');
                    }
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    // 跳转到主页
                    window.location.href = 'monitor.html';
                } else {
                    // 显示错误
                    errorText.textContent = '用户名或密码不能为空';
                    errorMsg.classList.remove('hidden');
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>登录';
                    loginBtn.disabled = false;
                }
            }, 1500);
        });

        // 注册链接
        document.getElementById('registerLink').addEventListener('click', function(e) {
            e.preventDefault();
            alert('注册功能开发中...');
        });
    </script>
</body>
</html>
