# 提猫直播助手 - Nginx 反向代理配置（仅显示后端页面）
# 审查人：叶维哲
# 适用于：宝塔面板
# 
# 配置说明：
# 访问公网IP时，所有请求直接代理到后端服务
# 不再显示 timao-app 目录中的前端构建文件
# 
# 使用方法（宝塔面板）：
# 1. 宝塔面板 → 网站 → 选择站点（129.211.218.135）
# 2. 设置 → 配置文件
# 3. 将下面的配置复制替换整个 server 块

server {
    listen 80;
    server_name 129.211.218.135;
    
    # 日志配置
    access_log /www/wwwlogs/timao-access.log;
    error_log /www/wwwlogs/timao-error.log;
    
    # 客户端最大上传大小
    client_max_body_size 50M;
    
    # 超时设置
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    
    # ===================================================================
    # 根路径：直接代理到后端（显示后端启动成功页面）
    # ===================================================================
    location / {
        proxy_pass http://127.0.0.1:11111;
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 禁用缓存
        proxy_buffering off;
        proxy_cache off;
    }
    
    # ===================================================================
    # API 文档
    # ===================================================================
    location /docs {
        proxy_pass http://127.0.0.1:11111/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /openapi.json {
        proxy_pass http://127.0.0.1:11111/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # ===================================================================
    # 健康检查
    # ===================================================================
    location /health {
        proxy_pass http://127.0.0.1:11111/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }
    
    # ===================================================================
    # 静态资源（后端的静态文件）
    # ===================================================================
    location /static/ {
        proxy_pass http://127.0.0.1:11111/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ===================================================================
# 说明
# ===================================================================
# 
# 此配置将：
# ✅ 根路径 (/) 直接代理到后端，显示后端启动成功页面
# ✅ 所有 API 请求都会正常工作
# ✅ WebSocket 连接支持
# ✅ API 文档可访问 (/docs)
# ❌ 不再显示 timao-app 目录下的前端构建文件
# 
# 如需恢复显示前端页面，请使用 nginx-config-baota.conf 配置

